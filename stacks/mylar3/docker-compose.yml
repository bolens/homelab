# Mylar3 – automated comic downloader (Usenet/torrents). Like Sonarr for comics.
# Configure NZBGet, qBittorrent, Prowlarr in the UI. Point /comics at a folder Komga can scan.
# Access via Caddy only (no host port).

services:
  mylar3:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - mylar3_config:/config
      - mylar3_comics:/comics
      - mylar3_downloads:/downloads
    networks:
      - monitor
      - usenet
      - torrents

networks:
  monitor:
    name: monitor
    external: true
  usenet:
    name: usenet
    external: true
  torrents:
    name: torrents
    external: true

volumes:
  mylar3_config:
  mylar3_comics:
  mylar3_downloads:
