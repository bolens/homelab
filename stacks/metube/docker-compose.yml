# MeTube – self-hosted YouTube/yt-dlp web UI.
# Image docs: https://github.com/alexta69/metube

name: metube

services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=${UMASK:-022}
    volumes:
      # Main download directory (videos, audio, state, temp files).
      - metube-downloads:/downloads
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8081/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  metube-downloads:

