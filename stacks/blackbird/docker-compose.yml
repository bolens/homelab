name: blackbird

services:
  blackbird:
    build:
      context: .
      dockerfile: Dockerfile
    image: blackbird:local
    container_name: blackbird
    restart: "no"
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      # Optional: store exported reports (PDF, CSV, JSON)
      - ./results:/results
    stdin_open: true
    tty: true

