# Config: copy loki-config.yml.example to ~/.config/loki/loki-config.yml
# (create the directory if needed). Override with LOKI_CONFIG_PATH if desired (e.g. in Portainer).
# For log shipping, deploy the promtail stack (stacks/promtail) separately.
services:
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      - loki_data:/loki
      - ${LOKI_CONFIG_PATH:-${HOME}/.config/loki/loki-config.yml}:/etc/loki/config.yml:ro
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  loki_data:

