# Stirling-PDF – PDF tools (merge, split, OCR, convert, watermark, etc.).
# No host ports; access via Caddy (e.g. https://stirling-pdf.yourdomain.com → stirling-pdf:8080).

name: stirling-pdf
services:
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
      - SECURITY_ALLOWSIGNUP=${SECURITY_ALLOWSIGNUP:-false}
    volumes:
      - stirling_pdf_data:/usr/share/tesseract-ocr/4.05/tessdata
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  stirling_pdf_data:
