# BookStack – wiki and documentation (books, chapters, pages).
# No host ports; access via Caddy (e.g. https://bookstack.yourdomain.com → bookstack:80).
# Requires MariaDB; set APP_URL to your Caddy hostname.
services:
  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: bookstack-mariadb
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
    volumes:
      - bookstack_mariadb:/config
    networks:
      - default
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
      - APP_URL=${APP_URL}
      - DB_HOST=mariadb
      - DB_DATABASE=bookstack
      - DB_USERNAME=bookstack
    volumes:
      - bookstack_data:/config
    networks:
      - default
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  bookstack_mariadb:
  bookstack_data:
