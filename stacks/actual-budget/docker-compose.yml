# Actual Budget – envelope-style budgeting (sync server).
# No host ports; access via Caddy (e.g. https://actual-budget.yourdomain.com → actual-budget:5006).
services:
  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      - actual_budget_data:/data
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:5006/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  actual_budget_data:
