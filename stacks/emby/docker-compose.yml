services:
  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: emby
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - emby_config:/config
      - media_tv:/data/tv
      - media_movies:/data/movies
      - media_music:/data/music
    networks:
      - monitor
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  monitor:
    name: monitor
    external: true

volumes:
  emby_config:
  media_tv:
    external: true
  media_movies:
    external: true
  media_music:
    external: true

