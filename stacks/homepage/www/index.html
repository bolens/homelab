<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under construction</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 28rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0;
      color: #a0a0a0;
      font-size: 1rem;
      line-height: 1.5;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">🚧</div>
    <h1>Under construction</h1>
    <p>Something is on the way. Check back soon.</p>
  </div>
</body>
</html>
