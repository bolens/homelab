# Homepage – static under-construction (or landing) page.
# No host ports: access via Caddy (reverse proxy to homepage:80).
# Edit www/index.html to change content; optional stack.env for TZ.
services:
  homepage:
    image: nginx:alpine
    container_name: homepage
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - ./www:/usr/share/nginx/html:ro
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  monitor:
    name: monitor
    external: true
