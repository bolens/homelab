services:
  privatebin:
    image: privatebin/nginx-fpm-alpine:latest
    container_name: privatebin
    restart: unless-stopped
    # No host port: access via Caddy (reverse proxy on monitor network)
    volumes:
      - privatebin_data:/srv/data
    networks:
      - monitor
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  privatebin_data: {}
