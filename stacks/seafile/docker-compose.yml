services:
  db:
    image: mariadb:10.11
    container_name: seafile-mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_LOG_CONSOLE=true
      - MYSQL_DATABASE=${SEAFILE_DB_NAME:-seafile}
      - MYSQL_USER=${SEAFILE_DB_USER:-seafile}
      - MYSQL_PASSWORD=${SEAFILE_DB_PASSWORD}
    volumes:
      - seafile_db:/var/lib/mysql
    networks:
      - default
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  memcached:
    image: memcached:alpine
    container_name: seafile-memcached
    restart: unless-stopped
    networks:
      - default

  seafile:
    image: seafileltd/seafile-mc:latest
    container_name: seafile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    env_file:
      - stack.env
    environment:
      - DB_HOST=db
      - DB_ROOT_PASSWD=${MYSQL_ROOT_PASSWORD}
      - SEAFILE_DB_NAME=${SEAFILE_DB_NAME:-seafile}
      - SEAFILE_DB_USER=${SEAFILE_DB_USER:-seafile}
      - SEAFILE_DB_PASSWORD=${SEAFILE_DB_PASSWORD}
      - SEAFILE_SERVER_HOSTNAME=${SEAFILE_SERVER_HOSTNAME}
      - TIME_ZONE=${TIME_ZONE:-America/Denver}
    volumes:
      - seafile_data:/shared
    networks:
      - default
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  seafile_db:
  seafile_data:

