services:
  readarr:
    image: lscr.io/linuxserver/readarr:nightly
    container_name: readarr
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - readarr_config:/config
      - media_books:/books
      - usenet_downloads:/downloads
      - torrents_downloads:/torrents
    networks:
      - monitor
      - usenet
      - torrents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8787/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true
  usenet:
    name: usenet
    external: true
  torrents:
    name: torrents
    external: true

volumes:
  readarr_config:
  media_books:
    external: true
  usenet_downloads:
    external: true
  torrents_downloads:
    external: true

