# ntfy – push notifications (HTTP pub/sub, Android/iOS app, optional auth).
# No host ports; access via Caddy (e.g. https://ntfy.yourdomain.com → ntfy:80).
services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
      - NTFY_BASE_URL=${NTFY_BASE_URL:-}
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
    command: ["serve"]
    volumes:
      - ntfy_cache:/var/cache/ntfy
      - ntfy_config:/etc/ntfy
    networks:
      - default
      - monitor

networks:
  monitor:
    name: monitor
    external: true

volumes:
  ntfy_cache:
  ntfy_config:
