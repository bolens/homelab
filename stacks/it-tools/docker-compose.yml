services:
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    # No host port: access via Caddy (reverse proxy on monitor network)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitor
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  monitor:
    name: monitor
    external: true
