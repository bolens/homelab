services:
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    # No host port: access via Caddy (reverse proxy on monitor network)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitor
    env_file:
      - stack.env

networks:
  monitor:
    name: monitor
    external: true
