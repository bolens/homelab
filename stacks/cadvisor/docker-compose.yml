# cAdvisor – container resource metrics (CPU, memory, network, filesystem).
# Prometheus scrapes this for container dashboards in Grafana. Access via Caddy (cadvisor.home).
# No host port: attaches to monitor network. Requires privileged for full host/container visibility.
services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - default
    env_file:
      - stack.env
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  default:
    name: monitor
    external: true

volumes: {}
