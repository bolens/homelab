# cAdvisor – container resource metrics (CPU, memory, network, filesystem).
# Prometheus scrapes this for container dashboards in Grafana. Access via Caddy (cadvisor.home).
# No host port: attaches to monitor network. Requires privileged for full host/container visibility.
services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - default
    env_file:
      - stack.env

networks:
  default:
    name: monitor
    external: true

volumes: {}
