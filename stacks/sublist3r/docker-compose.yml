name: sublist3r

# Sublist3r needs monitor network when using Caddy as HTTP proxy (HTTP_PROXY=http://caddy:3128).
# Results: default ~/.config/sublist3r/results. Override with SUBLIST3R_RESULTS_PATH (e.g. in Portainer).

services:
  sublist3r:
    image: opendevsecops/sublist3r:latest
    container_name: sublist3r
    restart: "no"
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${SUBLIST3R_RESULTS_PATH:-${HOME}/.config/sublist3r/results}:/results
    networks:
      - monitor
    stdin_open: true
    tty: true

networks:
  monitor:
    name: monitor
    external: true

