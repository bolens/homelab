services:
  docker-gc:
    image: ${DOCKER_GC_IMAGE:-harbor.yourdomain.com/homelab/docker-gc:latest}
    container_name: docker-gc
    restart: "no"
    env_file:
      - stack.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist docker-gc state between runs (default STATE_DIR=/var/lib/docker-gc)
      - docker_gc_state:/var/lib/docker-gc

volumes:
  docker_gc_state: {}

