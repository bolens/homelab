# Audiobookshelf – self-hosted podcasts (and audiobooks). See https://www.audiobookshelf.org/
# Portainer-friendly: named volumes, external monitor network for Caddy.
# Official example: https://github.com/advplyr/audiobookshelf/blob/master/docker-compose.yml
services:
  audiobookshelf:
    container_name: audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    env_file:
      - stack.env
    volumes:
      - abs_config:/config
      - abs_metadata:/metadata
      - abs_audiobooks:/audiobooks
      - abs_podcasts:/podcasts
    restart: unless-stopped
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:13378/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  abs_config:
  abs_metadata:
  abs_audiobooks:
  abs_podcasts:
