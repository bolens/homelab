# FreshRSS – self-hosted RSS feed reader (Feedly-like). See https://freshrss.org/
# Portainer-friendly: named volume, external monitor network for Caddy.
# Image: https://docs.linuxserver.io/images/docker-freshrss
services:
  freshrss:
    container_name: freshrss
    image: lscr.io/linuxserver/freshrss:latest
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - freshrss_config:/config
    restart: unless-stopped
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  freshrss_config:
