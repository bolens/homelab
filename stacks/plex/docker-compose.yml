services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - plex_config:/config
      - plex_transcode:/transcode
      - media_tv:/data/tv
      - media_movies:/data/movies
      - media_music:/data/music
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:32400/identity"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  monitor:
    name: monitor
    external: true

volumes:
  plex_config:
  plex_transcode:
  media_tv:
    external: true
  media_movies:
    external: true
  media_music:
    external: true

