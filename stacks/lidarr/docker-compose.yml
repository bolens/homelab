services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - lidarr_config:/config
      - media_music:/music
      - usenet_downloads:/downloads
      - torrents_downloads:/torrents
    networks:
      - monitor
      - usenet
      - torrents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8686/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true
  usenet:
    name: usenet
    external: true
  torrents:
    name: torrents
    external: true

volumes:
  lidarr_config:
  media_music:
    external: true
  usenet_downloads:
    external: true
  torrents_downloads:
    external: true

