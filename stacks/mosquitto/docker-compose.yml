services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - monitor
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$SYS/broker/version", "-C", "1", "-W", "3"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  mosquitto_config: {}
  mosquitto_data: {}
  mosquitto_log: {}

