services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    # No host port: access via Caddy (kuma.home / status.yourdomain.com on monitor network)
    volumes:
      - uptime_kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitor
    # Optional: run as specific user (Uptime Kuma defaults to node in image)
    # user: "1000:1000"
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  uptime_kuma_data: {}
