services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    # No host port: access via Caddy (kuma.home / status.yourdomain.com on monitor network)
    volumes:
      - uptime_kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitor
    # Optional: run as specific user (Uptime Kuma defaults to node in image)
    # user: "1000:1000"
    env_file:
      - stack.env

networks:
  monitor:
    name: monitor
    external: true

volumes:
  uptime_kuma_data: {}
