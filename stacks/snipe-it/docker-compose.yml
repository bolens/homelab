services:
  snipeit:
    image: snipe/snipe-it:latest
    container_name: snipe-it
    restart: unless-stopped
    depends_on:
      snipeit-db:
        condition: service_healthy
    env_file:
      - stack.env
    volumes:
      - snipeit_storage:/var/lib/snipeit
    networks:
      - default
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/login"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  snipeit-db:
    image: mariadb:11.5
    container_name: snipe-it-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-snipeit}
      - MYSQL_USER=${MYSQL_USER:-snipeit}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-REPLACE_WITH_GENERATED_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-REPLACE_WITH_GENERATED_PASSWORD}
    volumes:
      - snipeit_db:/var/lib/mysql
    networks:
      - default
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  monitor:
    name: monitor
    driver: bridge

volumes:
  snipeit_storage: {}
  snipeit_db: {}

