# Komga – comics and manga server. Web UI and OPDS (e.g. Tachiyomi).
# Access via Caddy only (no host port).

services:
  komga:
    image: gotson/komga:latest
    container_name: komga
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
      - SERVER_PORT=25600
    volumes:
      - komga_config:/config
      - komga_data:/data
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:25600/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  komga_config:
  komga_data:
