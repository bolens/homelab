# Privotron – CLI to automate data broker opt-outs (browser automation).
# No web server, no host ports. Run one-off: docker compose run --rm privotron --profile NAME
# No upstream image; build from Dockerfile: docker compose build
# https://github.com/kevinl95/Privotron

name: privotron

services:
  privotron:
    build:
      context: .
      args:
        PRIVOTRON_VERSION: ${PRIVOTRON_VERSION:-main}
    image: ${PRIVOTRON_IMAGE:-privotron:latest}
    container_name: privotron
    # Not a long-running service; use: docker compose run --rm privotron [args]
    volumes:
      # Persist profiles (saved with --save-profile)
      - privotron-profiles:/app/profiles
      # Optional: mount custom brokers or .skipbrokers (create brokers/.skipbrokers to skip brokers by slug)
      # - ./brokers:/app/brokers:ro
    env_file:
      - stack.env
    stdin_open: true
    tty: true

volumes:
  privotron-profiles:
