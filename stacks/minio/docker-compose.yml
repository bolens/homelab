services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      - minio_data:/data
    # No host ports; access via Caddy on the monitor network.
    networks:
      - monitor

networks:
  monitor:
    name: monitor
    external: true

volumes:
  minio_data:

