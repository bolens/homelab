name: ghunt

# GHunt needs monitor network when using Caddy as HTTP proxy (HTTP_PROXY=http://caddy:3128).

services:
  ghunt:
    image: ${GHUNT_IMAGE:-harbor.yourdomain.com/homelab/ghunt:latest}
    container_name: ghunt
    restart: "no"
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      # GHunt config (cookies, settings) – persisted between runs
      - ghunt-config:/root/.config/ghunt
      # Optional: place JSON exports and other outputs here
      - ghunt-data:/data
    networks:
      - monitor
    stdin_open: true
    tty: true

networks:
  monitor:
    name: monitor
    external: true

volumes:
  ghunt-config:
  ghunt-data:

