# n8n – workflow automation. Portainer-friendly: env defaults, external monitor network.
# Access via Caddy only (reverse_proxy n8n:5678). No host ports exposed.
# Set N8N_HOST and WEBHOOK_URL in stack.env to your Caddy hostname (e.g. https://n8n.home or https://n8n.yourdomain.com).
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    volumes:
      - n8n_data:/home/node/.n8n
      # Optional: share host directory for Read/Write Files from Disk node (path /files in n8n)
      # - ./local-files:/files
    env_file:
      - stack.env
    networks:
      - monitor

networks:
  monitor:
    name: monitor
    external: true

volumes:
  n8n_data: {}
