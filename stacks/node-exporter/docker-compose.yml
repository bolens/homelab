# Node Exporter – host metrics (CPU, memory, disk, etc.) for Prometheus.
# No host port; Prometheus scrapes node-exporter:9100 on the monitor network.
# Reads host filesystem via mounted root; add a scrape job in prometheus.yml.
services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitor
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9100/metrics"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  monitor:
    name: monitor
    external: true
