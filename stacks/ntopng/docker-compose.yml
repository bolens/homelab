services:
  ntopng:
    image: ntop/ntopng:stable
    container_name: ntopng
    restart: unless-stopped
    # ntopng inspects host network traffic; host networking is recommended.
    network_mode: host
    volumes:
      - ntopng_data:/var/lib/ntopng
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ntopng_data: {}

