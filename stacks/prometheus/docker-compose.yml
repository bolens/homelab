# Prometheus – metrics storage and scraping. Access via Caddy (prometheus.home).
# Scrapes cAdvisor (and itself). No host port: attaches to monitor network.
# Config: copy prometheus.yml.example to ~/.config/prometheus/prometheus.yml
# (create the directory if needed). Override path with PROMETHEUS_CONFIG_PATH if desired.
# Rules: copy alerts.yml.example to ~/.config/prometheus/rules/alerts.yml; set PROMETHEUS_RULES_PATH to that dir if different.
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-30d}
      - --web.enable-lifecycle
    volumes:
      - prometheus_data:/prometheus
      - ${PROMETHEUS_CONFIG_PATH:-${HOME}/.config/prometheus/prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - ${PROMETHEUS_RULES_PATH:-${HOME}/.config/prometheus/rules}:/etc/prometheus/rules:ro
    networks:
      - monitor
    env_file:
      - stack.env

networks:
  monitor:
    name: monitor
    external: true

volumes:
  prometheus_data: {}
