name: metagoofil

# Metagoofil needs monitor network when using Caddy as HTTP proxy (HTTP_PROXY=http://caddy:3128).
# No upstream image; build from Dockerfile. Data: default ~/.config/metagoofil/data.
# Override with METAGOOFIL_DATA_PATH (e.g. in Portainer).

services:
  metagoofil:
    build:
      context: .
    image: ${METAGOOFIL_IMAGE:-metagoofil:latest}
    container_name: metagoofil
    restart: "no"
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      - ${METAGOOFIL_DATA_PATH:-${HOME}/.config/metagoofil/data}:/data
    networks:
      - monitor
    stdin_open: true
    tty: true

networks:
  monitor:
    name: monitor
    external: true

