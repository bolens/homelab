name: metagoofil

services:
  metagoofil:
    build:
      context: .
      dockerfile: Dockerfile
    image: metagoofil:local
    container_name: metagoofil
    restart: "no"
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      # Downloaded documents and any extracted artifacts
      - ./data:/data
    stdin_open: true
    tty: true

