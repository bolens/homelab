name: spiderfoot

services:
  spiderfoot:
    image: spiderfoot/spiderfoot:latest
    container_name: spiderfoot
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      # Persistent scan data, config, API keys, etc.
      - spiderfoot-data:/var/lib/spiderfoot
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  spiderfoot-data:

