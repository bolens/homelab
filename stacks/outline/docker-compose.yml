services:
  postgres:
    image: postgres:16-alpine
    container_name: outline-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-outline}
      - POSTGRES_USER=${POSTGRES_USER:-outline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - outline_pg_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outline} -d ${POSTGRES_DB:-outline}"]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:alpine
    container_name: outline-redis
    restart: unless-stopped
    networks:
      - default

  outline:
    image: outlinewiki/outline:latest
    container_name: outline
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - stack.env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-outline}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-outline}
      - REDIS_URL=redis://redis:6379
      - URL=${URL}
      - SECRET_KEY=${SECRET_KEY}
      - UTILS_SECRET=${UTILS_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_UPLOAD_BUCKET_URL=${AWS_S3_UPLOAD_BUCKET_URL}
      - AWS_S3_UPLOAD_BUCKET_NAME=${AWS_S3_UPLOAD_BUCKET_NAME}
      - TZ=${TZ:-America/Denver}
    volumes:
      - outline_data:/var/lib/outline
    networks:
      - default
      - monitor

networks:
  monitor:
    name: monitor
    external: true

volumes:
  outline_pg_data:
  outline_data:

