# CrowdSec Security Engine. LAPI via Caddy only (no host port).
# Acquis: copy acquis.yaml.example to ~/.config/crowdsec/acquis.yaml (or set CROWDSEC_ACQUIS_PATH in stack.env).
name: crowdsec

services:
  crowdsec:
    image: crowdsecurity/crowdsec
    container_name: crowdsec
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
      # Group ID used by CrowdSec inside the container. Override if you need it
      # to match a host group that can read your log files.
      - GID=${GID:-1000}
      # Default hub collections to install; override in stack.env if you want
      # Caddy/NGINX/SSH collections or other bundles.
      - COLLECTIONS=${COLLECTIONS:-crowdsecurity/linux}
    volumes:
      # CrowdSec configuration (hub, parsers, scenarios, profiles, etc.)
      - crowdsec-config:/etc/crowdsec
      # Since CrowdSec 1.7.0, the data directory must be persisted in a volume
      # or the engine will refuse to start. See:
      # https://docs.crowdsec.net/u/getting_started/installation/docker/
      - crowdsec-data:/var/lib/crowdsec/data
      # Acquis: path to acquis.yaml on the host (default: ~/.config/crowdsec/acquis.yaml).
      # Copy acquis.yaml.example to that path; override with CROWDSEC_ACQUIS_PATH in stack.env.
      # Required when deploying from Portainer: set CROWDSEC_ACQUIS_PATH to the absolute path to the file.
      - ${CROWDSEC_ACQUIS_PATH:-${HOME}/.config/crowdsec/acquis.yaml}:/etc/crowdsec/acquis.yaml:ro
      # Optional: allow CrowdSec to inspect Docker container logs via the
      # Docker API. You still need to configure acquisitions for Docker sources;
      # see the official docs for examples.
      # https://docs.crowdsec.net/docs/next/log_processor/data_sources/docker
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # LAPI on 8080; no host port – Caddy is the single entrypoint (crowdsec.home / crowdsec.yourdomain.com).
    # Other containers (e.g. Prometheus, bouncers) on monitor use http://crowdsec:8080.
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  crowdsec-config:
  crowdsec-data:

