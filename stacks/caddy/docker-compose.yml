services:
  caddy:
    image: serfriz/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - monitor
    env_file:
      - stack.env

networks:
  monitor:
    name: monitor
    external: true

volumes:
  caddy_data: {}

# Validate Caddyfile (uses same image; stack.env supplies CLOUDFLARE_API_TOKEN):
#   docker compose run --rm --env-file stack.env caddy caddy validate --config /etc/caddy/Caddyfile
