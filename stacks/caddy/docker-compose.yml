services:
  caddy:
    image: serfriz/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # Uncomment when using forward proxy for CLI tools (Blackbird, GHunt, Metagoofil, etc.):
      # Requires Caddy built with forwardproxy plugin and :3128 { forward_proxy } in Caddyfile.
      # - "3128:3128"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitor
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  caddy_data: {}

# Validate Caddyfile (uses same image; stack.env supplies CLOUDFLARE_API_TOKEN):
#   docker compose run --rm --env-file stack.env caddy caddy validate --config /etc/caddy/Caddyfile
