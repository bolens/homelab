# Mailpit – local SMTP catcher for dev/testing.
# Receives mail on port 1025; web UI on 8025. No external delivery.
# Use with Postfix: set RELAYHOST=mailpit:1025 for internal-only mailing.
# Image docs: https://mailpit.axllent.org/docs/install/docker/

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    env_file:
      - stack.env
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8025/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  monitor:
    name: monitor
    external: true
