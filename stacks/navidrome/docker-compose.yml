name: navidrome

services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    env_file:
      - stack.env
    environment:
      - TZ=${TZ:-America/Denver}
    volumes:
      - navidrome_data:/data
      - navidrome_music:/music
    restart: unless-stopped
    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:4533/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  navidrome_data:
  navidrome_music:

