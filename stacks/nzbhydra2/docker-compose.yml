services:
  nzbhydra2:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: nzbhydra2
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - nzbhydra2_config:/config
    networks:
      - monitor
      - usenet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5076/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true
  usenet:
    name: usenet
    external: true

volumes:
  nzbhydra2_config:

