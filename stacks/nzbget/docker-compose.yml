services:
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Denver}
    volumes:
      - nzbget_config:/config
      - usenet_downloads:/downloads
    networks:
      - monitor
      - usenet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6789/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  monitor:
    name: monitor
    external: true
  usenet:
    name: usenet
    external: true

volumes:
  nzbget_config:
  usenet_downloads:
    external: true

