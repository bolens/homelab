services:
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: unless-stopped
    # No host port: access via Caddy only (reverse_proxy nodered:1880)
    volumes:
      - nodered_data:/data
    networks:
      - monitor
    env_file:
      - stack.env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  monitor:
    name: monitor
    external: true

volumes:
  nodered_data: {}

