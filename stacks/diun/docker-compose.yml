# Diun – Docker image update notifier. No web UI; notifications via Telegram, Discord, etc.
# Portainer-friendly: named volume; env from stack.env (see stack.env.example).
services:
  diun:
    image: crazymax/diun:latest
    container_name: diun
    env_file:
      - stack.env
    command: serve
    restart: unless-stopped
    volumes:
      - diun_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=America/Denver
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - LC_CTYPE=en_US.UTF-8
      - DIUN_WATCH_WORKERS=10
      - DIUN_WATCH_SCHEDULE=0 */6 * * *
      - DIUN_WATCH_JITTER=30s
      - DIUN_WATCH_RUNONSTARTUP=true
      - DIUN_PROVIDERS_DOCKER=true
      # Notifiers – set via env (e.g. stack.env or Portainer Environment; see stack.env.example)
      - DIUN_NOTIF_TELEGRAM_TOKEN=${DIUN_NOTIF_TELEGRAM_TOKEN:-}
      - DIUN_NOTIF_TELEGRAM_CHATIDS=${DIUN_NOTIF_TELEGRAM_CHATIDS:-}
      # Optional: Discord, webhook, etc. – see https://crazymax.dev/diun/config/
      # - DIUN_NOTIF_DISCORD_WEBHOOKURL=${DIUN_NOTIF_DISCORD_WEBHOOKURL:-}

    networks:
      - monitor
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  # Use external monitor only – do not create a stack default network (avoids subnet exhaustion)
  monitor:
    name: monitor
    external: true

volumes:
  diun_data: {}
