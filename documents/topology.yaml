# Topology data for the homelab diagram in docker/README.md.
# Run from docker/ repo root: python3 scripts/build-topology.py --in-place
# to regenerate the Mermaid diagram and prose in README.md (requires PyYAML).
#
# When adding a new stack: add it to the appropriate app_categories[].stacks list
# (or to infra if it is infrastructure/monitoring). Keep stack names in
# alphabetical order within each category. Update the category description
# if the new stack changes what the category represents.

ingress:
  - id: tunnel
    label: "cloudflare-tunnel<br>(optional)"
  - id: caddy
    label: "caddy<br>Reverse proxy<br>:80 / :443"

vpn:
  - id: headscale
    label: "headscale<br>Mesh VPN (Tailscale)"
  - id: wireguard
    label: "wireguard<br>Remote access VPN"
  - id: gluetun
    label: "gluetun<br>Container egress VPN"

# Application categories. Order here defines order in the diagram (alphabetical by id).
app_categories:
  - id: apps_acquisition
    name: "Media acquisition & *arr"
    descriptor: "torrents, *arr, Usenet"
    stacks:
      - qbittorrent
      - rtorrent-flood
      - nzbget
      - nzbhydra2
      - prowlarr
      - sonarr
      - radarr
      - lidarr
      - readarr
      - bazarr
      - metube
      - mylar3
    description: "download clients and *arr automation (torrents, Usenet, Sonarr/Radarr/Lidarr/Readarr, Bazarr, MeTube, Mylar3)"

  - id: apps_ai
    name: "AI & LLM"
    descriptor: "local models, chat UIs"
    stacks:
      - ollama
      - open-webui
      - librechat
      - open-notebook
      - perplexica
    description: "local models and chat UIs (Ollama, Open WebUI, LibreChat, Open Notebook, Perplexica)"

  - id: apps_dev
    name: "Developer & IT utilities"
    descriptor: "it-tools, ConvertX, Dozzle, Gitea, Kasm, CI, dashboard, PDF, NetBox, Snipe-IT"
    stacks:
      - baserow
      - convertx
      - dozzle
      - gitea
      - harbor
      - homarr
      - it-tools
      - kasm
      - netbox
      - ntfy
      - snipe-it
      - stirling-pdf
      - woodpecker-ci
    description: "it-tools, ConvertX, Dozzle, Gitea, Harbor, Woodpecker CI, Homarr dashboard, Baserow, Stirling-PDF, ntfy, NetBox, Snipe-IT"

  - id: apps_gaming
    name: "Gaming"
    descriptor: "ROMs, Steam, in-browser emulation"
    stacks:
      - asf
      - romm
    description: "Steam automation (ASF), ROM manager and in-browser emulation (RomM)"

  - id: apps_home
    name: "Home automation & IoT"
    descriptor: "Home Assistant, MQTT, Zigbee"
    stacks:
      - home-assistant
      - mosquitto
      - zigbee2mqtt
    description: "Home Assistant, Mosquitto (MQTT), Zigbee2MQTT"

  - id: apps_links
    name: "Links, shorteners & presence"
    descriptor: "YOURLS, Shlink, Linkstack, Stoat, homepage"
    stacks:
      - homepage
      - linkstack
      - shlink
      - stoat
      - yourls
    description: "YOURLS, Shlink, Linkstack, Stoat, static homepage/landing"

  - id: apps_media
    name: "Media & personal data"
    descriptor: "photos, docs, music, RSS, notes"
    stacks:
      - actual-budget
      - archivebox
      - audiobookshelf
      - bookstack
      - calibre-web
      - emby
      - firefly-iii
      - freshrss
      - hedgedoc
      - immich
      - jellyfin
      - joplin-server
      - logseq-sync
      - kavita
      - komga
      - lanraragi
      - linkding
      - linkwarden
      - mealie
      - navidrome
      - nextcloud
      - outline
      - paperless-ngx
      - plex
      - seafile
      - slink
      - syncthing
      - vikunja
    description: "consumption and personal content (photos, docs, music, recipes, bookmarks, RSS, comics, eBooks, tasks, wiki, notes, budgeting)"

  - id: apps_osint
    name: "OSINT & recon"
    descriptor: "username/email/phone recon"
    stacks:
      - social-hunt
      - maigret
      - spiderfoot
      - phoneinfoga
      - theharvester
      - holehe
      - blackbird
      - ghunt
      - metagoofil
      - reconftw
      - sublist3r
      - ail
      - web-check
    description: "username/email/phone recon, breach lookups, subdomain enumeration, AIL"

  - id: apps_privacy
    name: "Privacy & opt-out"
    descriptor: "data broker deletion"
    stacks:
      - naisho
      - privotron
    description: "data broker deletion (Naisho, Privotron)"

  - id: apps_search
    name: "Search"
    descriptor: "SearXNG metasearch, Meilisearch"
    stacks:
      - meilisearch
      - searx-ng
    description: "SearXNG, Meilisearch"

  - id: apps_sec_tooling
    name: "Security & compliance tooling"
    descriptor: "SBOM, threat model, scanner, forensics"
    stacks:
      - acquire
      - dependency-track
      - docker-forensics-toolkit
      - plaso
      - threat-dragon
      - zap
    description: "SBOM/vuln tracking (Dependency-Track), threat modeling (Threat Dragon), web scanner (ZAP), digital forensics (Acquire, Plaso, Docker Forensics Toolkit)"

  - id: apps_security
    name: "Security & identity"
    descriptor: "passwords, secrets, aliases, IdP"
    stacks:
      - authentik
      - guacamole
      - infisical
      - keycloak
      - password-pusher
      - privatebin
      - simplelogin
      - vaultwarden
    description: "passwords, secrets, aliases, remote desktop, secure sharing, IdP (Keycloak, authentik)"

  - id: apps_tor
    name: "Tor / dark web"
    descriptor: "OnionScan, OnionProbe, TorBot"
    stacks:
      - onionprobe
      - onionscan
      - torbot
    description: "OnionScan, OnionProbe, TorBot"

  - id: apps_workflow
    name: "Workflow automation"
    descriptor: "n8n, Node-RED"
    stacks:
      - n8n
      - nodered
    description: "n8n, Node-RED"

# Infrastructure & monitoring. Order is alphabetical by id.
infra:
  - id: adguard-home
    label: "adguard-home<br>DNS / ad blocking"
  - id: alertmanager
    label: "alertmanager<br>Alert routing"
  - id: blackbox-exporter
    label: "blackbox-exporter<br>Probes"
  - id: cadvisor
    label: "cAdvisor<br>Container metrics"
  - id: crowdsec
    label: "crowdsec<br>Security engine"
  - id: diun
    label: "diun<br>Image update notifier"
  - id: dockergc
    label: "docker-gc<br>Docker GC job"
  - id: grafana
    label: "grafana<br>Dashboards"
  - id: kuma
    label: "uptime-kuma<br>Monitoring"
  - id: loki
    label: "loki<br>Log aggregation"
  - id: mailpit
    label: "mailpit<br>SMTP catcher"
  - id: minio
    label: "minio<br>S3 object storage"
  - id: ntopng
    label: "ntopng<br>Traffic analytics"
  - id: portainer
    label: "portainer<br>Docker UI"
  - id: postfix
    label: "postfix<br>SMTP relay"
  - id: prometheus
    label: "prometheus<br>Metrics"
  - id: restic
    label: "restic<br>Backups (cron)"
  - id: scrutiny
    label: "scrutiny<br>SMART disk health"
  - id: vector
    label: "vector<br>Log shipper"
  - id: watchtower
    label: "watchtower<br>Auto-updates"

# App category IDs that use Gluetun for egress (dashed edge to gluetun).
gluetun_egress:
  - apps_acquisition

# App category IDs that use Postfix for SMTP (dashed edge to postfix).
smtp_clients:
  - apps_privacy
  - apps_workflow

# Relations: from → to (label) for diagram and short description for prose.
relations:
  - from: users
    to: tunnel
    description: "Clients use optional Cloudflare Tunnel to reach Caddy."
  - from: users
    to: caddy
    description: "Clients reach Caddy directly (local DNS or tunnel)."
  - from: tunnel
    to: caddy
    description: "Tunnel forwards to Caddy by hostname."
  - from: users
    to: wireguard
    description: "Clients connect via WireGuard for remote access."
  - from: users
    to: headscale
    description: "Clients join mesh via Headscale (Tailscale)."
  - from: caddy
    to: apps
    description: "Caddy routes HTTP(S) to all application stacks by hostname."
  - from: caddy
    to: infra
    description: "Caddy is managed and monitored by infra services."
  - from: wireguard
    to: caddy
    label: VPN
    description: "VPN clients reach Caddy and apps."
  - from: headscale
    to: caddy
    label: mesh
    description: "Mesh clients reach Caddy and apps."
  - from: apps_acquisition
    to: gluetun
    label: VPN egress
    description: "Media acquisition stacks send traffic through Gluetun (VPN)."
  - from: gluetun
    to: outbound
    label: egress
    description: "Gluetun egresses via VPN provider to internet."
  - from: apps_privacy
    to: postfix
    label: mail
    description: "Privacy/opt-out apps send mail via Postfix."
  - from: apps_workflow
    to: postfix
    label: mail
    description: "Workflow apps (e.g. n8n) send mail via Postfix."
  - from: postfix
    to: mailpit
    label: relay (internal-only)
    description: "When RELAYHOST=mailpit:1025, Postfix relays to Mailpit; no external delivery."
  - from: caddy
    to: crowdsec
    label: logs
    description: "Caddy logs feed CrowdSec security engine."
  - from: kuma
    to: caddy
    label: health
    description: "Uptime Kuma monitors Caddy and app health."
  - from: prometheus
    to: cadvisor
    label: scrapes
    description: "Prometheus scrapes cAdvisor for container metrics."
  - from: grafana
    to: prometheus
    label: queries
    description: "Grafana queries Prometheus for dashboards."
  - from: watchtower
    to: apps
    label: updates
    description: "Watchtower updates container images for app stacks."
  - from: dockergc
    to: apps
    label: cleanup
    description: "Docker GC cleans stopped containers and unused images."
  - from: diun
    to: users
    label: notify
    description: "Diun notifies users of new image tags."
  - from: portainer
    to: apps
    label: manage
    description: "Portainer manages Docker stacks and containers."
